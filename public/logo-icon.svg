<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5D485;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9A7B2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B0B8C1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8ECF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A9199;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- P shape (gold) -->
  <rect x="10" y="10" width="6" height="55" rx="2" fill="url(#goldGrad)"/>
  <path d="M16 10 Q40 10 40 28 Q40 46 16 46" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- L shape (silver) -->
  <rect x="48" y="10" width="6" height="55" rx="2" fill="url(#silverGrad)"/>
  <rect x="48" y="59" width="28" height="6" rx="2" fill="url(#silverGrad)"/>

  <!-- Diagonal slash (gold) -->
  <line x1="18" y1="65" x2="76" y2="10" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Leaf decoration -->
  <path d="M42 88 Q50 78 58 88" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="46" cy="83" rx="3" ry="5" transform="rotate(-20 46 83)" fill="url(#goldGrad)" opacity="0.8"/>
  <ellipse cx="54" cy="83" rx="3" ry="5" transform="rotate(20 54 83)" fill="url(#goldGrad)" opacity="0.8"/>
</svg>
